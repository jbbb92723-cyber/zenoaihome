<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <rect width="680" height="480" fill="#fbf8f4"/>
  <rect x="40" y="32" width="600" height="416" rx="2" stroke="#e7ded3" stroke-width="1.5" fill="white"/>
  <!-- Header -->
  <rect x="40" y="32" width="600" height="56" fill="#2b261f"/>
  <text x="64" y="67" font-family="system-ui" font-size="16" font-weight="600" fill="#fbf8f4">签约前追问清单（脱敏样张）</text>
  <text x="540" y="67" font-family="system-ui" font-size="12" fill="#c4a882">ZenoAIHome</text>
  <!-- Instruction -->
  <text x="64" y="112" font-family="system-ui" font-size="12" fill="#9a5424" font-weight="600">拿这份清单，逐项问施工方，要求书面回复。</text>
  <line x1="64" y1="128" x2="616" y2="128" stroke="#e7ded3" stroke-width="1"/>
  <!-- Item 1 -->
  <rect x="64" y="142" width="18" height="18" rx="2" stroke="#9a5424" stroke-width="1.5" fill="none"/>
  <text x="92" y="156" font-family="system-ui" font-size="13" font-weight="600" fill="#272421">防水工程是否包含在报价内？施工面积和层数是多少？</text>
  <text x="92" y="176" font-family="system-ui" font-size="11" fill="#7b6d5d">对应风险：漏项 · 防水未写入报价</text>
  <!-- Item 2 -->
  <rect x="64" y="196" width="18" height="18" rx="2" stroke="#9a5424" stroke-width="1.5" fill="none"/>
  <text x="92" y="210" font-family="system-ui" font-size="13" font-weight="600" fill="#272421">水电改造单价上限是多少？预估点位数量写进合同了吗？</text>
  <text x="92" y="230" font-family="system-ui" font-size="11" fill="#7b6d5d">对应风险：模糊项 · 按实结算无上限</text>
  <!-- Item 3 -->
  <rect x="64" y="250" width="18" height="18" rx="2" stroke="#9a5424" stroke-width="1.5" fill="none"/>
  <text x="92" y="264" font-family="system-ui" font-size="13" font-weight="600" fill="#272421">乳胶漆具体品牌、系列和型号是什么？"或同等"如何界定？</text>
  <text x="92" y="284" font-family="system-ui" font-size="11" fill="#7b6d5d">对应风险：模糊项 · 品牌替代</text>
  <!-- Item 4 -->
  <rect x="64" y="304" width="18" height="18" rx="2" stroke="#9a5424" stroke-width="1.5" fill="none"/>
  <text x="92" y="318" font-family="system-ui" font-size="13" font-weight="600" fill="#272421">变更增项的审批流程和单价标准写进合同了吗？</text>
  <text x="92" y="338" font-family="system-ui" font-size="11" fill="#7b6d5d">对应风险：增项流程 · 口头变更无记录</text>
  <!-- Item 5 -->
  <rect x="64" y="358" width="18" height="18" rx="2" stroke="#9a5424" stroke-width="1.5" fill="none"/>
  <text x="92" y="372" font-family="system-ui" font-size="13" font-weight="600" fill="#272421">每个付款节点对应的验收标准是什么？谁来确认？</text>
  <text x="92" y="392" font-family="system-ui" font-size="11" fill="#7b6d5d">对应风险：付款节点 · 未绑定验收</text>
  <!-- Footer -->
  <line x1="64" y1="416" x2="616" y2="416" stroke="#e7ded3" stroke-width="1"/>
  <text x="64" y="440" font-family="system-ui" font-size="11" fill="#7b6d5d">本样张为脱敏示例，实际清单基于你的报价风险报告逐项生成。</text>
</svg>
